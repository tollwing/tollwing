name: cross-region
description: >
  api in us-east-1 replicates to a service in eu-west-1: cross_region, charged
  everywhere — on the EGRESS side only (inter-region data transfer in is free;
  DEC-014 metered directions). 1 GiB on the wire (0.5 up + 0.5 down), of which
  only the 0.5 GiB sent bills at the AWS inter-region rate ($0.02/GiB from
  us-east-1) = $0.01. Exercises regionFromZone() distinguishing two real regions.
provider: aws
region: us-east-1
zones:
  us-east-1a:
    region: us-east-1
  eu-west-1a:
    region: eu-west-1
services:
  api:
    zone: us-east-1a
    namespace: shop
  replica:
    zone: eu-west-1a
    namespace: shop
traffic:
  - from: api
    to: replica
    requests: 1048576
    requestBytes: 512
    responseBytes: 512
expect:
  edges:
    - from: api
      to: replica
      type: cross_region
      costUSD: 0.01 # 0.5 GiB sent * $0.02/GiB; the 0.5 GiB received is free
