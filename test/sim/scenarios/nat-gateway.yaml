name: nat-gateway
description: >
  Traffic egressing through a NAT gateway (a known NAT ENI IP in private
  space). Per DEC-015 the flow pays BOTH the NAT data-processing charge
  ($0.045/GiB, both directions) AND the internet DTO charge on the bytes sent
  ($0.09/GiB marginal, DEC-014) — the bytes still leave the cloud after the
  NAT. The per-hour fixed charge is deliberately NOT part of per-flow cost
  (P4 — only bytes x dated-rate; hours surface via reconciliation).
  2 GiB out -> 2 * ($0.045 + $0.09) = $0.27.
provider: aws
region: us-east-1
zones:
  us-east-1a:
    region: us-east-1
services:
  worker:
    zone: us-east-1a
    namespace: batch
external:
  nat:
    ip: 10.0.99.1
natGatewayIPs:
  - 10.0.99.1
traffic:
  - from: worker
    to: nat
    requests: 2097152 # 2 * 2^20
    requestBytes: 1024
    responseBytes: 0 # 2 GiB
expect:
  edges:
    - from: worker
      to: nat
      type: nat_gateway
      costUSD: 0.27 # 2 GiB * ($0.045 NAT processing + $0.09 DTO)
