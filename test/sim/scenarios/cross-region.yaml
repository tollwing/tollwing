name: cross-region
description: >
  api in us-east-1 replicates to a service in eu-west-1: cross_region, charged
  everywhere (and pricier than cross-AZ). 1 GiB at the AWS cross-region rate
  ($0.02/GiB) = $0.02. Exercises regionFromZone() distinguishing two real regions.
provider: aws
region: us-east-1
zones:
  us-east-1a:
    region: us-east-1
  eu-west-1a:
    region: eu-west-1
services:
  api:
    zone: us-east-1a
    namespace: shop
  replica:
    zone: eu-west-1a
    namespace: shop
traffic:
  - from: api
    to: replica
    requests: 1048576
    requestBytes: 512
    responseBytes: 512
expect:
  edges:
    - from: api
      to: replica
      type: cross_region
      costUSD: 0.02
