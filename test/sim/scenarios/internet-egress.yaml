name: internet-egress-marginal
description: >
  A service egresses 5 GiB to the public internet, priced in the product's
  DEFAULT distributed mode (DEC-014): every GiB at the marginal post-free-tier
  list rate ($0.09/GiB in us-east-1), because a fleet of per-node engines
  cannot know the account's tier position — granting each node the 100 GB/mo
  account-wide free tier would under-report fleet dollars. 5 GiB -> $0.45.
  Ingress from the internet is free (Tx-only metering).
provider: aws
region: us-east-1
zones:
  us-east-1a:
    region: us-east-1
services:
  api:
    zone: us-east-1a
    namespace: shop
external:
  internet:
    ip: 8.8.8.8
traffic:
  - from: api
    to: internet
    requests: 5242880 # 5 * 2^20
    requestBytes: 1024
    responseBytes: 0 # total = 5 * 2^30 B = 5 GiB
expect:
  edges:
    - from: api
      to: internet
      type: internet_egress
      costUSD: 0.45 # 5 GiB * $0.09/GiB marginal rate
