name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-progress runs on the same ref, so a rapid series of
# pushes doesn't pile up N full CI runs — only the latest commit's run finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"

jobs:
  # Governance gate — stdlib-only Go, no BPF toolchain. Keeps the decision index
  # in sync and blocks constitutional regressions. See CONSTITUTION.md.
  governance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Decision index in sync (run 'go run ./tools/governance index' to fix)
        run: go run ./tools/governance index -check
      - name: No blocking constitutional violations
        run: go run ./tools/governance scan -gate

  # Leak-guard — the public repo self-defends with GENERIC mechanism checks:
  # fail if any enterprise-tagged file or unstripped boundary marker ever lands
  # here, no matter how it got in. This is belt-and-suspenders to the
  # allow-list publish pipeline in the private monorepo, which runs the full
  # leak scan at assemble time before anything reaches this repo.
  oss-guard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: No enterprise-tagged code or unstripped boundary markers
        run: |
          fail=0
          if find . -name '*_enterprise.go' | grep -q .; then
            echo "LEAK: enterprise-tagged file present"; find . -name '*_enterprise.go'; fail=1
          fi
          if grep -rnE '//go:build[^\n]*enterprise|//oss:strip' --include='*.go' . >/dev/null 2>&1; then
            echo "LEAK: enterprise build-tag or //oss:strip marker survived"
            grep -rnE '//go:build[^\n]*enterprise|//oss:strip' --include='*.go' . | head; fail=1
          fi
          if grep -rn 'oss:private' --include='*.md' . >/dev/null 2>&1; then
            echo "LEAK: unstripped oss:private annotation in published markdown"
            grep -rn 'oss:private' --include='*.md' . | head; fail=1
          fi
          [ "$fail" = 0 ] && echo "oss-guard: clean — no boundary markers in the public tree"
          exit $fail

  # Secret scan — gitleaks CLI via the official image. The gitleaks-ACTION
  # wrapper is paid for org-owned repos; the gitleaks tool itself is free/OSS,
  # so we run the binary directly.
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (detect over git history + tree)
        run: docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/gitleaks/gitleaks:latest detect --source . --redact --verbose

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      # go vet walks the go:embed of the compiled BPF objects, so compile first.
      - name: Ensure LLVM toolchain (reuse the runner's preinstalled clang)
        run: |
          if command -v clang >/dev/null && command -v llvm-strip >/dev/null; then
            echo "clang + llvm-strip already on PATH"
          else
            # ubuntu-24.04 ships versioned clang-NN/llvm-strip-NN but no
            # unversioned symlink; link the newest instead of a full apt install.
            v=$(ls /usr/bin/clang-[0-9]* 2>/dev/null | grep -oE '[0-9]+$' | sort -n | tail -1)
            if [ -n "$v" ] && [ -x "/usr/bin/clang-$v" ] && [ -x "/usr/bin/llvm-strip-$v" ]; then
              sudo ln -sf "/usr/bin/clang-$v" /usr/local/bin/clang
              sudo ln -sf "/usr/bin/llvm-strip-$v" /usr/local/bin/llvm-strip
              echo "symlinked preinstalled clang-$v / llvm-strip-$v (skipped apt)"
            else
              sudo apt-get update && sudo apt-get install -y clang llvm
            fi
          fi
      - name: Compile BPF
        run: make -f pkg/ebpf/bpf/Makefile bpf-all CLANG=clang LLVM_STRIP=llvm-strip
      - name: Go vet
        run: GOOS=linux GOARCH=amd64 go vet ./...
      - name: Vulnerability scan (govulncheck, advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Ensure LLVM toolchain (reuse the runner's preinstalled clang)
        run: |
          if command -v clang >/dev/null && command -v llvm-strip >/dev/null; then
            echo "clang + llvm-strip already on PATH"
          else
            # ubuntu-24.04 ships versioned clang-NN/llvm-strip-NN but no
            # unversioned symlink; link the newest instead of a full apt install.
            v=$(ls /usr/bin/clang-[0-9]* 2>/dev/null | grep -oE '[0-9]+$' | sort -n | tail -1)
            if [ -n "$v" ] && [ -x "/usr/bin/clang-$v" ] && [ -x "/usr/bin/llvm-strip-$v" ]; then
              sudo ln -sf "/usr/bin/clang-$v" /usr/local/bin/clang
              sudo ln -sf "/usr/bin/llvm-strip-$v" /usr/local/bin/llvm-strip
              echo "symlinked preinstalled clang-$v / llvm-strip-$v (skipped apt)"
            else
              sudo apt-get update && sudo apt-get install -y clang llvm
            fi
          fi
      - name: Compile BPF
        run: make -f pkg/ebpf/bpf/Makefile bpf-all CLANG=clang LLVM_STRIP=llvm-strip
      - name: Run tests (race detector)
        run: go test -race -count=1 -timeout=120s ./pkg/...

  # Pure-Go proof/oracle suite — no cluster, no kernel, no cloud account.
  sim:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Oracle proof suite + demo
        run: |
          make sim
          make demo

  build:
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Ensure LLVM toolchain (reuse the runner's preinstalled clang)
        run: |
          if command -v clang >/dev/null && command -v llvm-strip >/dev/null; then
            echo "clang + llvm-strip already on PATH"
          else
            # ubuntu-24.04 ships versioned clang-NN/llvm-strip-NN but no
            # unversioned symlink; link the newest instead of a full apt install.
            v=$(ls /usr/bin/clang-[0-9]* 2>/dev/null | grep -oE '[0-9]+$' | sort -n | tail -1)
            if [ -n "$v" ] && [ -x "/usr/bin/clang-$v" ] && [ -x "/usr/bin/llvm-strip-$v" ]; then
              sudo ln -sf "/usr/bin/clang-$v" /usr/local/bin/clang
              sudo ln -sf "/usr/bin/llvm-strip-$v" /usr/local/bin/llvm-strip
              echo "symlinked preinstalled clang-$v / llvm-strip-$v (skipped apt)"
            else
              sudo apt-get update && sudo apt-get install -y clang llvm
            fi
          fi
      - name: Compile BPF (x86 + arm64)
        run: make -f pkg/ebpf/bpf/Makefile bpf-all CLANG=clang LLVM_STRIP=llvm-strip
      - name: Verify BPF objects (hooks present)
        run: |
          file pkg/ebpf/bpf/bin/x86/tollwing.bpf.o
          llvm-objdump -h pkg/ebpf/bpf/bin/x86/tollwing.bpf.o | grep "cgroup/connect4"
          llvm-objdump -h pkg/ebpf/bpf/bin/x86/tollwing.bpf.o | grep "sockops"
      - name: Build agent (amd64 + arm64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/tollwing-agent-amd64 ./cmd/tollwing-agent
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/tollwing-agent-arm64 ./cmd/tollwing-agent
      - name: Build Terraform cost estimator (cross-platform)
        run: CGO_ENABLED=0 go build -o bin/tollwing-terraform ./cmd/tollwing-terraform
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  helm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: Helm lint (agent)
        run: helm lint deploy/helm/tollwing-agent
      - name: Helm template (agent renders a DaemonSet)
        run: |
          helm template test deploy/helm/tollwing-agent \
            --set agent.provider=aws --set agent.region=us-east-1 | grep "kind: DaemonSet"
